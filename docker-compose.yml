services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "llama3.2:1b"
    volumes:
      - chroma-data:/app/backend/.chroma

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: "http://localhost:8000"
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  chroma-data:
