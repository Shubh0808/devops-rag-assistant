apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend
  namespace: devops-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-backend
  template:
    metadata:
      labels:
        app: rag-backend
    spec:
      containers:
        - name: backend
          image: YOUR_DOCKERHUB_USERNAME/devops-rag-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATA_DIR
              value: /app/data
            - name: CHROMA_DIR
              value: /app/backend/.chroma
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
---
apiVersion: v1
kind: Service
metadata:
  name: rag-backend
  namespace: devops-rag
spec:
  selector:
    app: rag-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

