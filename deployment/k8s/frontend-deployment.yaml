apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-frontend
  namespace: devops-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-frontend
  template:
    metadata:
      labels:
        app: rag-frontend
    spec:
      containers:
        - name: frontend
          image: YOUR_DOCKERHUB_USERNAME/devops-rag-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: rag-frontend
  namespace: devops-rag
spec:
  selector:
    app: rag-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer

